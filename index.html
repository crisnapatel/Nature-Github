<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discover · Research News</title>
    <meta
      name="description"
      content="Discover feed for materials research, tech and science, and world updates."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Serif+4:opsz,wght@8..60,400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body data-view="home">
    <div class="discover-shell">
      <header class="discover-header">
        <p class="discover-title">Discover</p>
        <div class="discover-actions">
          <a class="icon-btn" href="archive/" aria-label="Open archive">Archive</a>
          <a class="icon-btn" href="runs/2026-03-16-live/" aria-label="Open latest run">Latest</a>
        </div>
      </header>

      <main>
        <section class="quick-stats" id="quick-stats">
          <div class="stat-card">
            <p class="stat-label">Latest run</p>
            <p class="stat-value" id="latest-run-date">-</p>
          </div>
          <div class="stat-card">
            <p class="stat-label">Coverage</p>
            <p class="stat-value">Q1/Q2/Q3 journals</p>
          </div>
          <div class="stat-card">
            <p class="stat-label">Cards</p>
            <p class="stat-value" id="card-count">0</p>
          </div>
        </section>

        <section class="feed-tabs" id="feed-tabs" aria-label="News categories">
          <button class="feed-tab is-active" data-tab="for_you" type="button">For You</button>
          <button class="feed-tab" data-tab="materials" type="button">Materials</button>
          <button class="feed-tab" data-tab="tech_science" type="button">Tech &amp; Science</button>
          <button class="feed-tab" data-tab="world" type="button">World</button>
        </section>

        <section class="cards-stream" id="cards-stream"></section>
      </main>
    </div>

    <script src="assets/app.js" defer></script>
  </body>
</html>
