<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Research News Archive</title>
    <meta
      name="description"
      content="Historical archive of computational materials science research digests."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Serif+4:opsz,wght@8..60,400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/styles.css" />
  </head>
  <body data-view="archive">
    <div class="page-shell">
      <header class="hero hero-compact">
        <p class="eyebrow">Archive</p>
        <h1>Digest History</h1>
        <p class="hero-copy">
          Every run stays accessible. Morning and evening digests accumulate as
          a browsable research log.
        </p>
        <div class="hero-actions">
          <a class="button button-solid" href="../">Back to home</a>
        </div>
      </header>

      <main>
        <section class="section-heading">
          <div>
            <p class="eyebrow">All Runs</p>
            <h2>Chronological archive</h2>
          </div>
        </section>

        <section class="archive-list" id="archive-list"></section>
      </main>
    </div>

    <script src="../assets/app.js" defer></script>
  </body>
  </html>
