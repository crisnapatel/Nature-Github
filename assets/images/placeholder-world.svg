<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">World placeholder</title>
  <desc id="desc">Abstract globe-like placeholder for world news items without a retrievable source image.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f2937" />
      <stop offset="100%" stop-color="#7f1d1d" />
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)" />
  <g fill="none" stroke="#bfdbfe" stroke-width="8" opacity="0.82">
    <circle cx="600" cy="315" r="180" />
    <ellipse cx="600" cy="315" rx="180" ry="72" />
    <ellipse cx="600" cy="315" rx="92" ry="180" />
    <path d="M420 315h360" />
    <path d="M448 248h304" />
    <path d="M448 382h304" />
  </g>
  <g fill="#eff6ff">
    <text x="84" y="560" font-family="Space Grotesk, Arial, sans-serif" font-size="72" font-weight="700">World Feed</text>
    <text x="84" y="618" font-family="Source Serif 4, Georgia, serif" font-size="34">Fallback image for global news without reusable source photography</text>
  </g>
</svg>
